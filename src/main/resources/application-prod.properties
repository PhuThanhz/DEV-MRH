spring.datasource.url=jdbc:mysql://central-mysql:3306/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Keep production logs and SMTP failures from blocking request threads.
spring.jpa.show-sql=false
app.notifications.evaluation.email.enabled=false
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

lotusgroup.upload-file.dir=/app/uploads
