###############################################
# APPLICATION INFO
###############################################
spring.application.name=${APP_NAME}
server.address=0.0.0.0

###############################################
# JPA DEFAULT
###############################################
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

###############################################
# JWT
###############################################
lotusgroup.jwt.base64-secret=${JWT_SECRET}
lotusgroup.jwt.access-token-validity-in-seconds=604800
lotusgroup.jwt.refresh-token-validity-in-seconds=5184000

###############################################
# FILE UPLOAD
###############################################
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
lotusgroup.upload-file.public-url=/uploads

###############################################
# PAGINATION
###############################################
spring.data.web.pageable.one-indexed-parameters=true

###############################################
# DEFAULT PASSWORD
###############################################
app.default-password=${APP_DEFAULT_PASSWORD}